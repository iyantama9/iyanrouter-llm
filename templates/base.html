<!DOCTYPE html>
<html lang="en" x-data="{ dark: true }" :class="dark ? 'dark' : ''">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Iyan Router{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            card: 'hsl(var(--card))',
            'card-foreground': 'hsl(var(--card-foreground))',
            popover: 'hsl(var(--popover))',
            'popover-foreground': 'hsl(var(--popover-foreground))',
            primary: 'hsl(var(--primary))',
            'primary-foreground': 'hsl(var(--primary-foreground))',
            secondary: 'hsl(var(--secondary))',
            'secondary-foreground': 'hsl(var(--secondary-foreground))',
            muted: 'hsl(var(--muted))',
            'muted-foreground': 'hsl(var(--muted-foreground))',
            accent: 'hsl(var(--accent))',
            'accent-foreground': 'hsl(var(--accent-foreground))',
            destructive: 'hsl(var(--destructive))',
            'destructive-foreground': 'hsl(var(--destructive-foreground))',
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ── shadcn + Neo-Kinpaku CSS Variables ── */
    :root {
      /* Light mode - warm ivory base */
      --background: 42 33% 97%;
      --foreground: 25 15% 12%;
      --card: 42 30% 95%;
      --card-foreground: 25 15% 12%;
      --popover: 42 33% 97%;
      --popover-foreground: 25 15% 12%;
      --primary: 38 65% 48%;
      --primary-foreground: 42 33% 97%;
      --secondary: 42 15% 91%;
      --secondary-foreground: 25 15% 12%;
      --muted: 42 15% 91%;
      --muted-foreground: 25 10% 45%;
      --accent: 165 45% 35%;
      --accent-foreground: 42 33% 97%;
      --destructive: 0 55% 50%;
      --destructive-foreground: 0 0% 100%;
      --border: 35 12% 85%;
      --input: 35 12% 85%;
      --ring: 38 65% 48%;
      --radius: 0.5rem;
    }

    .dark {
      /* Dark mode - lacquer ground */
      --background: 25 15% 6%;
      --foreground: 42 20% 92%;
      --card: 25 14% 9%;
      --card-foreground: 42 20% 92%;
      --popover: 25 15% 6%;
      --popover-foreground: 42 20% 92%;
      --primary: 42 60% 58%;
      --primary-foreground: 25 15% 6%;
      --secondary: 25 10% 14%;
      --secondary-foreground: 42 20% 92%;
      --muted: 25 10% 14%;
      --muted-foreground: 35 10% 55%;
      --accent: 165 40% 42%;
      --accent-foreground: 42 33% 97%;
      --destructive: 0 50% 55%;
      --destructive-foreground: 0 0% 100%;
      --border: 25 10% 16%;
      --input: 25 10% 16%;
      --ring: 42 60% 58%;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: hsl(var(--background)); }
    ::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground)); }

    /* ── Animations ── */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .animate-shimmer {
      background: linear-gradient(90deg, hsl(var(--secondary)) 25%, hsl(var(--muted)) 50%, hsl(var(--secondary)) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes toast-in {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-enter {
      animation: toast-in 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pulse-dot {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(3); opacity: 0; }
    }
    .pulse-ring::after {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: inherit;
      animation: pulse-dot 2s ease-out infinite;
    }

    /* ── Kinpaku gold accent seam ── */
    .gold-seam {
      position: relative;
    }
    .gold-seam::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, hsl(42 60% 58%), transparent);
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .gold-seam:hover::before {
      opacity: 1;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .animate-shimmer { animation: none; background: hsl(var(--secondary)); }
      .pulse-ring::after { animation: none; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-background text-foreground font-body antialiased">
  {% block content %}{% endblock %}

  <script>lucide.createIcons();</script>
  {% block scripts %}{% endblock %}
</body>
</html>
